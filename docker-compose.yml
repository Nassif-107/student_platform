services:
  mongodb:
    image: mongo:7
    container_name: sp-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sp-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: sp-neo4j
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/student-platform-secret
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD', 'cypher-shell', '-u', 'neo4j', '-p', 'student-platform-secret', 'RETURN 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sp-network
    restart: unless-stopped

  influxdb:
    image: influxdb:2
    container_name: sp-influxdb
    ports:
      - '8086:8086'
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: student-platform-influx
      DOCKER_INFLUXDB_INIT_ORG: student-platform
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: student-platform-influx-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ['CMD', 'influx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sp-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sp-network
    restart: unless-stopped

networks:
  sp-network:
    driver: bridge

volumes:
  mongodb_data:
  neo4j_data:
  influxdb_data:
  redis_data:
